<!--
  这是最基础的 WebRTC 演示页：
  1. 先点击 Start 建立 WebRTC 连接并拿到 sessionid；
  2. 再把文本通过 /human 接口发给后端；
  3. 后端会驱动数字人生成音视频，并通过 WebRTC 回传到本页。
-->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveTalking</title>
    <style>
    button {
        padding: 8px 16px;
    }

    video {
        width: 100%;
    }

    .option {
        margin-bottom: 8px;
    }

    .mode-group {
        margin: 12px 0 8px;
    }

    .mode-group label {
        margin-right: 16px;
    }

    .llm-settings {
        margin: 10px 0;
    }

    .llm-settings label {
        display: block;
        margin: 8px 0 4px;
    }

    .llm-settings textarea {
        width: 600px;
        min-height: 70px;
    }

    #media {
        max-width: 1280px;
    }
    </style>
</head>
<body>

<div class="option">
    <input id="use-stun" type="checkbox"/>
    <label for="use-stun">Use STUN server</label>
</div>
<button id="start" onclick="start()">Start</button>
<button id="stop" style="display: none" onclick="stop()">Stop</button>
<button class="btn btn-primary" id="btn_start_record">Start Recording</button>
<button class="btn btn-primary" id="btn_stop_record" disabled>Stop Recording</button>
<!-- <button class="btn btn-primary" id="btn_download">Download Video</button> -->
<input type="hidden" id="sessionid" value="0">
<form class="form-inline" id="echo-form">
    <div class="form-group">
      <p>input text</p>
      <div class="mode-group">
        <span>mode: </span>
        <label>
            <input type="radio" name="request-type" value="echo" checked>
            echo 直接播报
        </label>
        <label>
            <input type="radio" name="request-type" value="chat">
            chat 本地大模型回复
        </label>
      </div>

      <div class="llm-settings">
        <label for="persona-prompt">persona 人设</label>
        <textarea class="form-control" id="persona-prompt">人设：你叫林晚，是一个专业但不油腻的中文直播主播。你的表达自然、有亲和力，擅长把产品优势讲得具体可信。回答观众问题时不要夸大承诺，不说绝对化用语，不输出动作描述、表情符号或 Markdown，只输出适合数字人直接口播的话。</textarea>

        <label for="live-context">live context 当前口播/产品上下文</label>
        <textarea class="form-control" id="live-context">当前直播内容：正在介绍一款家用空气炸锅，主打少油烹饪、操作简单、容量适合三口之家、日常做鸡翅薯条和加热半成品比较方便。当前优惠价 299 元，强调理性下单和适合真实日常使用，不承诺治疗、减肥、绝对安全或永久耐用。</textarea>
      </div>

      <textarea cols="2" rows="3" style="width:600px;height:50px;" class="form-control" id="message">test</textarea>
    </div>
    <button type="submit" class="btn btn-default">Send</button>
  </form>

<div id="media">
    <h2>Media</h2>

    <audio id="audio" autoplay="true"></audio>
    <video id="video" style="width:600px;" autoplay="true" playsinline="true"></video>
</div>

<script src="client.js"></script>
<!-- <script type="text/javascript" src="http://cdn.sockjs.org/sockjs-0.3.4.js"></script> -->
<script type="text/javascript" src="https://code.jquery.com/jquery-2.1.1.min.js"></script>
</body>

	  $('#echo-form').on('submit', function(e) {
      e.preventDefault();
      var message = $('#message').val();
      var requestType = $('input[name="request-type"]:checked').val() || 'echo';
      var payload = {
          text: message,
          type: requestType,
          interrupt: true,
          sessionid: String(document.getElementById('sessionid').value),
      };
      if (requestType === 'chat') {
          payload.llm = {
              persona: $('#persona-prompt').val(),
              context: $('#live-context').val(),
          };
      }
      console.log('Sending: ' + message);
      console.log('type: ', requestType);
      console.log('sessionid: ',document.getElementById('sessionid').value);
      fetch('/human', {
            body: JSON.stringify(payload),
            headers: {
                'Content-Type': 'application/json'
            },
            method: 'POST'
      });
      //ws.send(message);
      $('#message').val('');
	  });

    $('#btn_start_record').click(function() {
        // 开始录制
        console.log('Starting recording...');
        fetch('/record', {
            body: JSON.stringify({
                    type: 'start_record',
                    sessionid: String(document.getElementById('sessionid').value),
                }),
                headers: {
                    'Content-Type': 'application/json'
                },
            method: 'POST'
        }).then(function(response) {
            if (response.ok) {
                console.log('Recording started.');
                $('#btn_start_record').prop('disabled', true);
                $('#btn_stop_record').prop('disabled', false);
                // $('#btn_download').prop('disabled', true);
            } else {
                console.error('Failed to start recording.');
            }
        }).catch(function(error) {
            console.error('Error:', error);
        });
    });

    $('#btn_stop_record').click(function() {
        // 结束录制
        console.log('Stopping recording...');
        fetch('/record', {
            body: JSON.stringify({
                    type: 'end_record',
                    sessionid: String(document.getElementById('sessionid').value),
                }),
                headers: {
                    'Content-Type': 'application/json'
                },
            method: 'POST'
        }).then(function(response) {
            if (response.ok) {
                console.log('Recording stopped.');
                $('#btn_start_record').prop('disabled', false);
                $('#btn_stop_record').prop('disabled', true);
                // $('#btn_download').prop('disabled', false);
            } else {
                console.error('Failed to stop recording.');
            }
        }).catch(function(error) {
            console.error('Error:', error);
        });
    });

</html>
